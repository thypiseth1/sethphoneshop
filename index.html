<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ហាងទូរស័ព្ទ ពិសិដ្ឋ និង ម៉េងហៀង</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#2563eb', // Blue 600
            'brand-light': '#eff6ff', // Blue 50
            surface: '#ffffff',
            background: '#f8fafc', // Slate 50
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            'float': '0 12px 30px -4px rgba(0, 0, 0, 0.08)',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Battambang:wght@400;700&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { font-family: 'Battambang', 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body, html { background-color: #f8fafc; color: #0f172a; margin: 0; padding: 0; overflow-x: hidden; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 24px); }
    .pt-safe { padding-top: max(env(safe-area-inset-top), 16px); }
    
    /* Animations */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes slideInUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade { animation: fadeIn 0.3s ease-out forwards; }

    /* Custom Input Focus */
    input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    
    /* Loading Screen */
    #loading-screen { position: fixed; inset: 0; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: opacity 0.5s ease; }
    .loader-dots { display: flex; gap: 8px; margin-bottom: 20px; }
    .loader-dots div { width: 12px; height: 12px; border-radius: 50%; background: #2563eb; animation: bounce 0.5s alternate infinite cubic-bezier(0.6, 0.05, 0.15, 0.95); }
    .loader-dots div:nth-child(2) { animation-delay: 0.1s; }
    .loader-dots div:nth-child(3) { animation-delay: 0.2s; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  </style>
</head>
<body>
  
  <div id="loading-screen">
    <div class="loader-dots"><div></div><div></div><div></div></div>
    <h2 class="text-xl text-center font-black tracking-tight text-slate-900 mb-2">ហាងទូរស័ព្ទ <br><span class="text-brand text-2xl">ពិសិដ្ឋ និង ម៉េងហៀង</span></h2>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, memo } = React;

    const Icons = {
      Home: ({filled, size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill={filled?"currentColor":"none"} stroke="currentColor" strokeWidth={filled?"0":"2"} strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Search: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
      Bag: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
      History: ({filled, size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill={filled?"currentColor":"none"} stroke="currentColor" strokeWidth={filled?"0":"2"} strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
      Heart: ({filled, size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill={filled?"#ef4444":"none"} stroke={filled?"#ef4444":"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
      User: ({filled, size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill={filled?"currentColor":"none"} stroke="currentColor" strokeWidth={filled?"0":"2"} strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      Plus: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Minus: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Close: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      ChevronDown: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      ChevronRight: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      Back: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
      Check: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Trash: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
      MapPin: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
      Phone: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
      Cpu: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>,
      Battery: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="16" height="10" rx="2" ry="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>,
    };

    const CATEGORIES = ["ទាំងអស់", "Apple", "Samsung", "Vivo", "Oppo", "Tecno"];

    const RAW_PHONES = [
      { b: "Apple", n: "iPhone 15 Pro Max", p: 1199, cpu: "A17 Pro", cam: "48MP Triple", bat: "4422mAh" },
      { b: "Apple", n: "iPhone 15 Pro", p: 999, cpu: "A17 Pro", cam: "48MP Triple", bat: "3274mAh" },
      { b: "Apple", n: "iPhone 15 Plus", p: 899, cpu: "A16 Bionic", cam: "48MP Dual", bat: "4383mAh" },
      { b: "Apple", n: "iPhone 15", p: 799, cpu: "A16 Bionic", cam: "48MP Dual", bat: "3349mAh" },
      { b: "Samsung", n: "Galaxy S24 Ultra", p: 1299, cpu: "Snapdragon 8 Gen 3", cam: "200MP Quad", bat: "5000mAh" },
      { b: "Samsung", n: "Galaxy S24+", p: 999, cpu: "Snapdragon 8 Gen 3", cam: "50MP Triple", bat: "4900mAh" },
      { b: "Samsung", n: "Galaxy Z Fold 5", p: 1799, cpu: "Snapdragon 8 Gen 2", cam: "50MP Triple", bat: "4400mAh" },
      { b: "Samsung", n: "Galaxy Z Flip 5", p: 999, cpu: "Snapdragon 8 Gen 2", cam: "12MP Dual", bat: "3700mAh" },
      { b: "Vivo", n: "X100 Pro", p: 1050, cpu: "Dimensity 9300", cam: "50MP Triple", bat: "5400mAh" },
      { b: "Vivo", n: "V30 Pro", p: 499, cpu: "Dimensity 8200", cam: "50MP Triple", bat: "5000mAh" },
      { b: "Oppo", n: "Find X7 Ultra", p: 1199, cpu: "Snapdragon 8 Gen 3", cam: "50MP Quad", bat: "5000mAh" },
      { b: "Oppo", n: "Reno 11 Pro", p: 599, cpu: "Dimensity 8200", cam: "50MP Triple", bat: "4600mAh" },
      { b: "Tecno", n: "Phantom V Fold", p: 1099, cpu: "Dimensity 9000+", cam: "50MP Triple", bat: "5000mAh" },
      { b: "Tecno", n: "Camon 30 Premier", p: 450, cpu: "Dimensity 8200", cam: "50MP Triple", bat: "5000mAh" },
    ];

    const PHONES = RAW_PHONES.map((phone, i) => {
      const serverNum = (i % 4) + 1;
      const exactSearch = encodeURIComponent(`${phone.b} ${phone.n} smartphone official render white background`);
      return {
        id: i + 1,
        name: phone.n,
        brand: phone.b,
        category: phone.b,
        price: phone.p,
        cpu: phone.cpu,
        cam: phone.cam,
        bat: phone.bat,
        image: `https://tse${serverNum}.mm.bing.net/th?q=${exactSearch}&pid=Api&mkt=en-US&adlt=moderate&w=400&h=400`
      };
    });

    const INITIAL_ORDERS = [];

    const SafeImage = memo(({ src, name, className, imageClassName="" }) => {
      const [error, setError] = useState(false);
      const [loaded, setLoaded] = useState(false);

      if (error) {
        return (
          <div className={`flex items-center justify-center bg-slate-100 rounded-2xl ${className}`}>
             <div className="w-[50%] h-[70%] border-2 border-slate-300 rounded-xl flex flex-col items-center justify-center relative bg-white">
                <div className="absolute top-0 w-1/3 h-1.5 bg-slate-200 rounded-b-md"></div>
             </div>
          </div>
        );
      }

      return (
        <div className={`flex items-center justify-center overflow-hidden relative bg-transparent rounded-2xl ${className}`}>
          {!loaded && (
            <div className="absolute inset-0 flex items-center justify-center z-10 bg-slate-50/50">
               <div className="w-6 h-6 border-2 border-slate-200 border-t-brand rounded-full animate-spin"></div>
            </div>
          )}
          <img 
            src={src} alt={name} 
            className={`w-full h-full object-contain transition-all duration-500 mix-blend-multiply ${loaded ? 'opacity-100 scale-100' : 'opacity-0 scale-95'} ${imageClassName}`} 
            onLoad={() => setLoaded(true)}
            onError={() => setError(true)} 
            loading="lazy" 
          />
        </div>
      );
    });

    function App() {
      const [view, setView] = useState('home');
      const [activeCat, setActiveCat] = useState('ទាំងអស់');
      const [query, setQuery] = useState('');
      const [cart, setCart] = useState([]);
      const [favs, setFavs] = useState([1, 5, 11]); 
      const [orders, setOrders] = useState(INITIAL_ORDERS);
      const [selItem, setSelItem] = useState(null);
      const [modalQty, setModalQty] = useState(1);
      
      // Payment Flow States
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isPayOpen, setIsPayOpen] = useState(false);
      const [payStatus, setPayStatus] = useState('info'); 
      const [payMethod, setPayMethod] = useState('aba');
      const [deliveryInfo, setDeliveryInfo] = useState({ name: '', phone: '', address: '', note: '' });
      const [isSending, setIsSending] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => {
          const loader = document.getElementById('loading-screen');
          if(loader) {
             loader.style.opacity = '0';
             setTimeout(() => loader.remove(), 500);
          }
        }, 800);
        return () => clearTimeout(timer);
      }, []);

      const filtered = useMemo(() => {
        let list = view === 'favorites' ? PHONES.filter(p => favs.includes(p.id)) : PHONES;
        const catValue = activeCat === 'ទាំងអស់' ? 'All' : activeCat;
        return list.filter(p => 
            (catValue === 'All' || p.brand === catValue) && 
            (p.name.toLowerCase().includes(query.toLowerCase()))
        );
      }, [view, activeCat, query, favs]);

      const toggleFav = (id) => setFavs(prev => prev.includes(id) ? prev.filter(f => f !== id) : [...prev, id]);

      const addToCart = (p, qty = 1) => {
        setCart(prev => {
          const has = prev.find(x => x.id === p.id);
          if (has) return prev.map(x => x.id === p.id ? { ...x, qty: x.qty + qty } : x);
          return [...prev, { ...p, qty }];
        });
      };

      const updateQty = (id, delta) => setCart(prev => prev.map(x => x.id === id ? { ...x, qty: Math.max(0, x.qty + delta) } : x).filter(x => x.qty > 0));

      const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);

      const handleSendTelegram = async () => {
        setIsSending(true);

        let message = `🛒 ការកម្ម៉ង់ថ្មី (ហាងទូរស័ព្ទ ពិសិដ្ឋ និង ម៉េងហៀង)៖\n\n`;
        message += `👤 ឈ្មោះ៖ ${deliveryInfo.name}\n`;
        message += `📞 ទូរស័ព្ទ៖ ${deliveryInfo.phone}\n`;
        message += `📍 ទីតាំង៖ ${deliveryInfo.address}\n`;
        if (deliveryInfo.note) message += `📝 ចំណាំ៖ ${deliveryInfo.note}\n`;
        message += `----------------------\n`;
        cart.forEach((item, index) => {
          message += `${index + 1}. ${item.brand} ${item.name} (x${item.qty}) = $${(item.price * item.qty).toFixed(2)}\n`;
        });
        message += `----------------------\n`;
        message += `💵 សរុប៖ $${total.toFixed(2)}\n`;
        message += `🏦 បង់តាម៖ ${payMethod.toUpperCase()}\n`;

        // Your specific Telegram Credentials
        const BOT_TOKEN = '8861272349:AAGJgltkge3qeZDR6He6x2317s-XUcz-aoQ'; 
        const CHAT_ID = '6956629522'; 
        
        try {
          const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message }),
          });
          
          if (!response.ok) throw new Error('Telegram API Error');

          setPayStatus('success');
          
          const newOrder = {
            id: `ORD-${Math.floor(Math.random() * 9000) + 1000}`,
            date: 'ឥឡូវនេះ',
            name: cart[0]?.name || 'Device',
            items: cart.reduce((a, b) => a + b.qty, 0),
            total: total,
            status: 'កំពុងរៀបចំ',
            brandObj: cart[0] || PHONES[0]
          };
          setOrders(prev => [newOrder, ...prev]);
          setTimeout(() => { setCart([]); }, 500);

        } catch (error) {
          console.error('Error:', error);
          alert('សុំទោស មានបញ្ហាក្នុងការបញ្ជូនទិន្នន័យ។ សូមពិនិត្យអ៊ីនធឺណិតរបស់អ្នក។');
        } finally {
          setIsSending(false);
        }
      };

      const closeCheckout = () => {
        setIsPayOpen(false);
        setPayStatus('info');
        setDeliveryInfo({ name: '', phone: '', address: '', note: '' });
        setView('orders');
      };

      return (
        <div className="max-w-md mx-auto min-h-screen relative flex flex-col bg-background shadow-2xl overflow-hidden">
          
          {/* Top Header */}
          <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-slate-200/60 px-5 pt-safe h-[72px] flex items-center justify-between">
            <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setView('home'); setActiveCat('ទាំងអស់'); setQuery('');}}>
              <div className="flex flex-col">
                 <span className="font-black text-base sm:text-lg tracking-tight text-slate-900 leading-none">ហាងទូរស័ព្ទ <span className="text-brand">ពិសិដ្ឋ និង ម៉េងហៀង</span></span>
                 <span className="text-slate-500 font-medium text-[10px] uppercase tracking-widest mt-1">Premium Tech</span>
              </div>
            </div>
            <button onClick={() => setIsCartOpen(true)} className="relative p-2 text-slate-600 hover:text-brand transition-colors">
              <Icons.Bag size={26} />
              {cart.length > 0 && <span className="absolute top-1 right-1 bg-red-500 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center ring-2 ring-white">{cart.reduce((a,b)=>a+b.qty,0)}</span>}
            </button>
          </header>

          <main className="flex-1 overflow-y-auto hide-scrollbar relative z-10 pb-[90px]">
            
            {}
            {view === 'home' && (
              <div className="animate-fade-up px-5 pt-6">
                
                {/* Search Bar */}
                <div className="relative mb-6">
                  <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                  <input type="text" placeholder="ស្វែងរកម៉ូដែល..." className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-medium outline-none focus:border-brand focus:ring-4 focus:ring-brand-light transition-all text-slate-800 placeholder-slate-400 shadow-sm" value={query} onChange={e => setQuery(e.target.value)} />
                </div>

                {/* Clean Horizontal Categories */}
                <div className="flex gap-6 overflow-x-auto mb-8 hide-scrollbar -mx-5 px-5 pb-1">
                  {CATEGORIES.map(c => (
                    <button key={c} onClick={() => setActiveCat(c)} className={`flex-shrink-0 pb-2 text-[15px] font-bold transition-all relative whitespace-nowrap ${activeCat === c ? 'text-brand' : 'text-slate-400 hover:text-slate-600'}`}>
                      {c}
                      {activeCat === c && <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-brand rounded-full"></div>}
                    </button>
                  ))}
                </div>

                <div className="flex items-center justify-between mb-5">
                  <h3 className="font-bold text-lg text-slate-800">{activeCat === 'ទាំងអស់' ? 'ពេញនិយមថ្មីៗ' : `ម៉ូដែល ${activeCat}`}</h3>
                  <span className="text-xs font-semibold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">{filtered.length} ម៉ូដែល</span>
                </div>

                {/* Minimal Grid Layout */}
                <div className="grid grid-cols-2 gap-4">
                  {filtered.map(p => (
                    <div key={p.id} onClick={() => {setSelItem(p); setModalQty(1);}} className="bg-white rounded-3xl p-3 shadow-soft border border-slate-100 flex flex-col cursor-pointer active:scale-95 transition-transform group relative overflow-hidden">
                      <button onClick={(e) => {e.stopPropagation(); toggleFav(p.id);}} className="absolute top-3 right-3 p-1.5 bg-white/80 backdrop-blur-sm rounded-full text-slate-300 hover:text-red-500 z-10 transition-colors shadow-sm">
                         <Icons.Heart filled={favs.includes(p.id)} size={18} />
                      </button>

                    <div className="bg-white p-3 rounded-[2rem] mb-6 flex items-center justify-center shadow-float border border-slate-100 w-[220px] h-[220px] mx-auto relative overflow-hidden">
                       {payMethod === 'aba' ? (
                          <img src="https://img.sanishtech.com/u/f5365bf96d1519aad900fc5a647710b5.jpg" alt="ABA" className="w-full h-full object-cover rounded-2xl" />
                       ) : (
                          <img src="https://img.sanishtech.com/u/7b17da25642c89b6ca8b3d377eb84ff0.jpg" alt="ACLEDA" className="w-full h-full object-cover rounded-2xl" />
                       )}
                    </div>
                    
                    <h3 className="text-3xl font-black text-slate-900 mb-1 tracking-tight">៛{(total * 4100).toLocaleString()}</h3>
                    <p className="text-slate-500 font-bold text-sm mb-6">${total.toFixed(2)} USD</p>
                    
                    <p className="text-[10px] font-bold text-slate-400 mb-4 uppercase tracking-widest">បន្ទាប់ពីស្កេនរួច សូមចុចប៊ូតុង</p>
                    
                    <button onClick={handleSendTelegram} disabled={isSending} className={`w-full text-white font-bold py-4 rounded-xl text-[15px] flex items-center justify-center gap-2 transition-all shadow-float ${isSending ? 'bg-slate-400 shadow-none cursor-not-allowed' : 'bg-emerald-500 active:scale-95 shadow-emerald-500/30'}`}>
                       {isSending ? (
                         <><div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>កំពុងបញ្ជូន...</>
                       ) : (
                         <><Icons.Check size={20} className="text-white" />ខ្ញុំបានបង់ប្រាក់រួចហើយ</>
                       )}
                    </button>
                  </div>
                )}

                {/* Step 4: Success */}
                {payStatus === 'success' && (
                  <div className="animate-fade py-8 mt-4">
                    <div className="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-soft">
                      <Icons.Check size={48} />
                    </div>
                    <h3 className="text-2xl font-black text-slate-900 mb-3 tracking-tight">ជោគជ័យ!</h3>
                    <p className="text-sm text-slate-500 font-medium mb-10 leading-relaxed px-4">អរគុណសម្រាប់ការកម្ម៉ង់។<br/>យើងបានទទួលព័ត៌មានរបស់អ្នកហើយ។</p>
                    <button onClick={closeCheckout} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl active:scale-95 transition-all text-[15px] shadow-float shadow-slate-900/20">ត្រឡប់ទៅប្រវត្តិទិញ</button>
                  </div>
                )}
              </div>
            </div>
          )}

        </div>
      );
    }

    const initApp = () => {
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
      } catch (err) {
        document.getElementById('loading-screen').innerHTML = `<div style="padding:20px;color:red;text-align:center;">Error: ${err.message}</div>`;
      }
    };
    initApp();
  </script>
</body>
</html>
