                {payStatus === 'processing' && (
                  <div className="animate-fade py-6">
                    <div className="text-red-500 font-black text-2xl tracking-widest mb-6"><span className="bg-red-500 text-white px-2 py-0.5 rounded-lg mr-1">KH</span>QR</div>
                    <div className="bg-white p-6 rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.08)] border border-zinc-100 mb-6 inline-block">
                       <Icons.QrCode />
                    </div>
                    <h3 className="text-3xl font-black text-zinc-900 mb-1 tracking-tight">៛{(total * 4100).toLocaleString()}</h3>
                    <p className="text-zinc-400 font-bold text-sm mb-8">${total.toFixed(2)} USD</p>
                    <p className="text-xs font-bold text-zinc-900 animate-pulse bg-zinc-100 py-3 rounded-xl">កំពុងរង់ចាំការស្កេន...</p>
                  </div>
                )}

                {payStatus === 'success' && (
                  <div className="animate-fade py-8">
                    <div className="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6">
                      <Icons.Check size={48} />
                    </div>
                    <h3 className="text-2xl font-black text-zinc-900 mb-2 tracking-tight">ការទូទាត់ជោគជ័យ</h3>
                    <p className="text-sm text-zinc-500 font-medium mb-8">ឧបករណ៍ថ្មីរបស់អ្នកកំពុងត្រូវបានរៀបចំសម្រាប់ការដឹកជញ្ជូន។</p>
                    <button onClick={() => {setIsPayOpen(false); setPayStatus('idle'); setCart([]); setView('orders');}} className="w-full bg-zinc-900 text-white font-bold py-4 rounded-full active:scale-95 transition-all text-sm shadow-xl">មើលស្ថានភាពការបញ្ជាទិញ</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* FIXED: ADJUSTED BOTTOM NAVIGATION BAR TO NOT GET CUT OFF */}
          <nav className="fixed bottom-2 left-4 right-4 max-w-[380px] mx-auto h-[64px] glass-pill rounded-[1.5rem] flex items-center justify-around px-2 z-40 shadow-[0_10px_40px_rgba(0,0,0,0.1)] border border-white/50 mb-safe">
            {[
              { id: 'home', label: 'ហាង', icon: Icons.Home },
              { id: 'orders', label: 'ប្រវត្តិ', icon: Icons.History },
              { id: 'favorites', label: 'ចំណូលចិត្ត', icon: Icons.Heart },
              { id: 'profile', label: 'គណនី', icon: Icons.User }
            ].map(tab => {
              const active = view === tab.id;
              const IconComp = tab.icon;
              return (
                <button 
                  key={tab.id} 
                  onClick={() => { setView(tab.id); if(tab.id==='home'){setActiveCat('ទាំងអស់'); setQuery('');} }} 
                  className="flex flex-col items-center justify-center w-16 h-full relative group"
                >
                  <div className={`transition-all duration-300 ease-out ${active ? 'text-indigo-600 -translate-y-2' : 'text-zinc-400 group-hover:text-zinc-600'}`}>
                    <IconComp filled={active} />
                  </div>
                  <span className={`absolute bottom-1.5 text-[9px] font-black uppercase tracking-widest transition-all duration-300 ease-out ${active ? 'opacity-100 text-zinc-900 translate-y-0' : 'opacity-0 translate-y-2'}`}>
                    {tab.label}
                  </span>
                </button>
              );
            })}
          </nav>
        </div>
      );
    }

    const initApp = () => {
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => {
          const loader = document.getElementById('loading-screen');
          if(loader) {
             loader.style.opacity = '0';
             setTimeout(() => loader.remove(), 500);
          }
        }, 500); 
      } catch (err) {
        document.getElementById('loading-screen').innerHTML = `<div style="padding:20px;color:red;text-align:center;">Error: ${err.message}</div>`;
      }
    };
    initApp();
  </script>
</body>
</html>
